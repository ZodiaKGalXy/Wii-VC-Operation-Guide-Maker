<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wii Virtual Console Operation Guide Maker</title>
        <link href="styles.css" rel="stylesheet"/>
    </head>
    <body>
        <div class="screenshot-box"></div>
        <h1 id="header-text">This game uses the Wii Remote in horizontal style.</h1>
        <table>
            <thead>
                <!-- The header row of the table. -->
                <tr>
                    <th class="Image-Column"></th>
                    <th class="Text-Column Text-Column-Font Text-Row-Color">User Input</th>
                    <th class="Text-Column Text-Column-Font Text-Row-Color">Game Result</th>
                </tr>
            </thead>
            <tbody>
                <!-- The first row of the table. -->
                <tr>
                    <td class="Image-Column"></td>
                    <td class="Input-Column Text-Column-Font" contenteditable="true"></td>
                    <td class="Text-Column Text-Column-Font" contenteditable="true"></td>
                </tr>
            </tbody>
        </table>
        <!-- Buttons to add and remove rows -->
        <button id="add-row-btn">Add Row</button>
        <button id="remove-row-btn">Remove Row</button>
        <!-- Image palette for dragging images into the table -->
        <div id="image-palette" class="palette">
            <p class="palette-text"> Drag and Drop Images Here:</p>
        </div>
        <div class="control-style-selector">
            <label for="control-style">Select the controller style:</label>
            <select id="control-style">
                <option value="This game uses the Wii Remote in horizontal style.">Wii Remote (Horizontal)</option>
                <option value="This game uses the Wii Remote in vertical style.">Wii Remote (Vertical)</option>
                <option value="This game requires the Wii Classic Controller.">Wii Classic Controller</option>
            </select>
        </div>
        <!-- Import JavaScript Scripts -->
        <script src="script.js"></script>
    </body>
</html>
