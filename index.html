<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wii Virtual Console Operation Guide Maker</title>
        <link href="styles.css" rel="stylesheet"/>
    </head>
    <body>
        <h1>This game uses the Wii Remote in horizontal style.</h1>
        <table>
            <thead>
                <!-- The header row of the table. -->
                <tr>
                    <th class="Image-Column"></th>
                    <th class="Text-Column Text-Column-Font Text-Row-Color">User Input</th>
                    <th class="Text-Column Text-Column-Font Text-Row-Color">Game Result</th>
                </tr>
            </thead>
            <tbody>
                <!-- The first row of the table. -->
                <tr>
                    <td class="Image-Column">
                        <img class="Image-Cell" src="./img/WiiPlusButton.png" alt="+">
                    </td>
                    <td class="Text-Column Text-Column-Font">Left, Right</td>
                    <td class="Text-Column Text-Column-Font">Character moves</td>
                </tr>
                <!-- The second row of the table. -->
                <tr>
                    <td class="Image-Column">
                        <img class="Image-Cell" src="./img/WiiRemoteA.png" alt="A">
                    </td>
                    <td class="Text-Column Text-Column-Font">A Button</td>
                    <td class="Text-Column Text-Column-Font">Character jumps</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
